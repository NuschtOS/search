name: "flake build"

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: ["26.05", "unstable"]
        os: ["ubuntu", "macos"]

    runs-on: ${{ matrix.os }}-latest

    steps:
      - uses: actions/checkout@v6

      # NOTE: not using the nix-daemon causes different hashes in FOD
      # - name: Install Nix
      #   uses: nixbuild/nix-quick-install-action@v30
      #
      # - uses: nix-community/cache-nix-action@v6
      #   with:
      #     primary-key: nix-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
      #     restore-prefixes-first-match: nix-${{ runner.os }}-${{ matrix.target }}-
      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: build stable
        if: matrix.target != 'unstable'
        run: |
          nix build -L --max-jobs 1 \
            --override-input nixpkgs github:NuschtOS/nuschtpkgs/backports-${{ matrix.target }}

      - name: build unstable
        if: matrix.target == 'unstable'
        run: |
          nix build -L --max-jobs 1
